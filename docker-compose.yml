services:
  simple-express-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: simple-express-app:latest
    container_name: simple-express-app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
